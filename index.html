<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elberta Wood & Pencil Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --sand: #F5EFE0;
      --warm: #FFF8F0;
      --coral: #D4603A;
      --gold: #C8942A;
      --forest: #3D5A3E;
      --ink: #1E1810;
      --mist: #8B7D6B;
      --light-border: rgba(100,80,50,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; background: var(--warm); color: var(--ink); overflow-x: hidden; }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 3rem;
      background: rgba(255,248,240,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--light-border);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 600;
      color: var(--ink); letter-spacing: 0.04em;
      line-height: 1.2;
    }
    .nav-logo span { color: var(--coral); font-style: italic; }
    nav ul { display: flex; gap: 2rem; list-style: none; align-items: center; }
    nav a { text-decoration: none; color: var(--ink); font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; transition: color 0.2s; }
    nav a:hover { color: var(--coral); }
    .nav-admin-btn {
      background: none; border: 1.5px solid var(--mist);
      padding: 0.4rem 1rem; border-radius: 2rem;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; color: var(--mist); font-family: 'Jost', sans-serif;
      transition: all 0.2s;
    }
    .nav-admin-btn:hover { border-color: var(--coral); color: var(--coral); }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 8rem 3rem 5rem;
      position: relative;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #F5EFE0 0%, #FFF8F0 40%, #EEF5EE 100%);
      z-index: 0;
    }
    .hero-decor {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 45%;
      background: linear-gradient(160deg, var(--forest) 0%, #2A3D2B 50%, #1A2A1B 100%);
      clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
      z-index: 0;
    }
    .hero-content { position: relative; z-index: 1; max-width: 560px; }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 6vw, 6rem);
      line-height: 1.0; font-weight: 600;
      color: var(--ink); margin-bottom: 1.5rem;
    }
    .hero h1 em { font-style: italic; color: var(--coral); }
    .hero-sub {
      font-size: 1rem; color: var(--mist); line-height: 1.8;
      font-weight: 300; max-width: 400px; margin-bottom: 3rem;
    }
    .btn-main {
      background: var(--coral); color: white;
      padding: 0.9rem 2.2rem; border-radius: 0.3rem;
      border: none; font-family: 'Jost', sans-serif;
      font-size: 0.85rem; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s; text-decoration: none;
      display: inline-block;
    }

    /* ===== SHOP ===== */
    .shop { padding: 6rem 3rem; position: relative; }
    #products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
    .product-card {
      background: white; border-radius: 0.5rem; overflow: hidden;
      border: 1px solid var(--light-border);
      transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
    }
    .product-img { height: 260px; overflow: hidden; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-body { padding: 1.3rem; }
    .product-price { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--coral); }
    
    /* ===== ADMIN ===== */
    .admin-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(15,12,7,0.7); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 1rem;
    }
    .admin-overlay.open { display: flex; }
    .admin-panel {
      background: white; border-radius: 1rem; width: 100%; max-width: 600px;
      max-height: 90vh; overflow-y: auto; padding: 2rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; color: var(--mist); margin-bottom: 0.4rem; }
    .form-group input { width: 100%; padding: 0.75rem; border: 1.5px solid var(--light-border); border-radius: 0.3rem; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Elberta <span>Wood & Pencil</span></div>
  <ul>
    <li><a href="#tienda">Tienda</a></li>
    <li><button class="nav-admin-btn" onclick="openAdmin()">✦ Edición</button></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-decor"></div>
  <div class="hero-content">
    <h1>Arte hecho<br>con el <em>alma</em></h1>
    <p class="hero-sub">Maderas rescatadas del olvido en Fuerteventura.</p>
    <a href="#tienda" class="btn-main">Ver obras →</a>
  </div>
</section>

<section class="shop" id="tienda">
  <div id="products-grid"></div>
</section>

<!-- PANEL EDICIÓN -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
      <h3>Panel de Administración</h3>
      <button onclick="closeAdmin()" style="cursor:pointer; background:none; border:none; font-size:1.5rem;">&times;</button>
    </div>

    <!-- SECCIÓN IBAN -->
    <div style="background:var(--sand); padding:1rem; border-radius:0.5rem; margin-bottom:2rem;">
      <label style="font-size:0.7rem; font-weight:bold;">IBAN PARA TRANSFERENCIA:</label>
      <input type="text" id="settingIban" style="width:100%; padding:0.5rem; margin-top:0.5rem;">
      <button onclick="saveIban()" style="margin-top:0.5rem; padding:0.4rem 1rem; cursor:pointer;">Guardar IBAN</button>
    </div>

    <!-- FORMULARIO PRODUCTO -->
    <div class="form-group"><label>Nombre de la obra</label><input type="text" id="pName"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
      <div class="form-group"><label>Precio (€)</label><input type="number" id="pPrice"></div>
      <div class="form-group"><label>Costo Envío (€)</label><input type="number" id="pShipping"></div>
    </div>
    <div class="form-group"><label>URL Imagen</label><input type="text" id="pImage"></div>
    <div class="form-group"><label>Técnica</label><input type="text" id="pTech"></div>
    <button class="btn-main" onclick="saveProduct()" style="width:100%">Publicar Obra</button>

    <div id="adminList" style="margin-top:2rem; border-top:1px solid #eee; padding-top:1rem;"></div>
  </div>
</div>

<script>
  let products = JSON.parse(localStorage.getItem('elberta_products')) || [];
  let iban = localStorage.getItem('elberta_iban') || "ES00 0000 0000 0000 0000";
  const paypalEmail = "pachiberta@gmail.com";

  function renderProducts() {
    const grid = document.getElementById('products-grid');
    if (products.length === 0) {
      grid.innerHTML = '<p style="grid-column:1/-1; text-align:center;">Usa el panel de edición para añadir obras.</p>';
      return;
    }
    grid.innerHTML = products.map((p, i) => {
      const price = parseFloat(p.price || 0);
      const ship = parseFloat(p.shipping || 0);
      const total = price + ship;
      return `
        <div class="product-card">
          <div class="product-img"><img src="${p.image}"></div>
          <div class="product-body">
            <p style="font-size:0.7rem; text-transform:uppercase; color:var(--mist);">${p.technique}</p>
            <h3 class="product-name">${p.name}</h3>
            <p style="font-size:0.8rem; margin:0.5rem 0;">Obra: ${price}€ | Envío: ${ship}€</p>
            <div class="product-price">Total: ${total}€</div>
            <div style="margin-top:1rem; display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;">
              <button onclick="payPayPal('${p.name}', ${total})" style="background:#0070ba; color:white; border:none; padding:0.6rem; border-radius:0.3rem; cursor:pointer; font-weight:600;">PayPal</button>
              <button onclick="payTransfer(${total})" style="background:var(--ink); color:white; border:none; padding:0.6rem; border-radius:0.3rem; cursor:pointer; font-weight:600;">Transferencia</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function payPayPal(name, total) {
    const url = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${paypalEmail}&item_name=${encodeURIComponent(name)}&amount=${total}&currency_code=EUR`;
    window.open(url, '_blank');
  }

  function payTransfer(total) {
    alert(`Por favor, realiza una transferencia de ${total}€ a:\n\nIBAN: ${iban}\n\nIndica el nombre de la obra en el concepto.`);
  }

  function openAdmin() { document.getElementById('adminOverlay').classList.add('open'); }
  function closeAdmin() { document.getElementById('adminOverlay').classList.remove('open'); }

  function saveIban() {
    iban = document.getElementById('settingIban').value;
    localStorage.setItem('elberta_iban', iban);
    alert("IBAN actualizado correctamente");
  }

  function saveProduct() {
    const p = {
      name: document.getElementById('pName').value,
      price: document.getElementById('pPrice').value,
      shipping: document.getElementById('pShipping').value || 0,
      image: document.getElementById('pImage').value,
      technique: document.getElementById('pTech').value
    };
    products.push(p);
    localStorage.setItem('elberta_products', JSON.stringify(products));
    renderProducts();
    renderAdminList();
    alert("Obra añadida");
  }

  function deleteProduct(i) {
    if(confirm("¿Eliminar obra?")) {
      products.splice(i, 1);
      localStorage.setItem('elberta_products', JSON.stringify(products));
      renderProducts();
      renderAdminList();
    }
  }

  function renderAdminList() {
    const list = document.getElementById('adminList');
    list.innerHTML = products.map((p, i) => `
      <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem; font-size:0.8rem; background:#f9f9f9; padding:0.5rem;">
        <span>${p.name}</span>
        <button onclick="deleteProduct(${i})" style="color:red; cursor:pointer; border:none; background:none;">Eliminar</button>
      </div>
    `).join('');
  }

  document.getElementById('settingIban').value = iban;
  window.onload = () => { renderProducts(); renderAdminList(); };
</script>

</body>
</html>
